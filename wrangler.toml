name = "strategic-report-proxy"
main = "src/worker/index.js"
compatibility_date = "2024-01-01"

# KV Namespace Bindings
kv_namespaces = [
  { binding = "WA_KV", id = "649b22e2b92a4101bbf82f7f7c593e6f" },
  { binding = "RATE_LIMIT_KV", id = "b217ea96b7af467f8e1ef54b022f15e6" },
]

# Secrets (set via: npx wrangler secret put <NAME>)
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
# TWILIO_ACCOUNT_SID
# TWILIO_AUTH_TOKEN
# SESSION_TOKEN_SECRET

# Plain-text env vars
[vars]
CLAUDE_MODEL = "claude-sonnet-4-6"
WA_MODEL = "claude-haiku-4-5-20251001"
ALLOWED_ORIGIN = "https://hcuevasg.github.io,https://strategic-report-agent.pages.dev"
APP_URL = "https://strategic-report-agent.pages.dev"
TWILIO_WHATSAPP_NUMBER = "+14155238886"
RATE_LIMIT_PER_HOUR = "30"
WA_RATE_LIMIT_PER_HOUR = "20"
# STATS_TOKEN — set via: npx wrangler secret put STATS_TOKEN
# If not set, defaults to first 20 chars of ANTHROPIC_API_KEY
